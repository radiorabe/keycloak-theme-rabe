version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: "chore(ci): "
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
